name: Cross-Platform AOT Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    # 根据矩阵自动分配到不同的操作系统服务器
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # 哪怕某个平台失败，其他平台继续打包
      matrix:
        include:
          # --- Windows 系列 (使用 Windows 服务器) ---
          - rid: win-x64
            os: windows-latest
            ext: zip
          - rid: win-x86        # 32 位 Windows
            os: windows-latest
            ext: zip
          - rid: win-arm64
            os: windows-latest
            ext: zip
          
          # --- Linux 系列 (使用 Ubuntu 服务器) ---
          - rid: linux-x64
            os: ubuntu-latest
            ext: tar.gz
          - rid: linux-arm64
            os: ubuntu-latest
            ext: tar.gz
          
          # --- macOS 系列 (苹果已彻底淘汰 32 位，只保留 64 和 ARM) ---
          - rid: osx-x64
            os: macos-13        # Intel 架构服务器
            ext: tar.gz
          - rid: osx-arm64
            os: macos-14        # 苹果 M 系芯片 (ARM64) 服务器
            ext: tar.gz

          # 注：.NET AOT 目前对 Linux 32位 ARM (linux-arm) 支持极度受限且极易在运行时崩溃，为了保证发布质量，此处暂不构建 linux-arm AOT。

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    # 安装 Linux x64 AOT 必需的 C++ 依赖
    - name: Install Linux x64 AOT Dependencies
      if: matrix.rid == 'linux-x64'
      run: |
        sudo apt-get update
        sudo apt-get install -y clang zlib1g-dev

    # 安装 Linux ARM64 交叉编译 AOT 必需的 C++ 工具链
    - name: Install Linux ARM64 Cross-Compiler
      if: matrix.rid == 'linux-arm64'
      run: |
        sudo dpkg --add-architecture arm64
        sudo apt-get update
        sudo apt-get install -y clang llvm gcc-aarch64-linux-gnu zlib1g-dev:arm64

    - name: Publish .NET AOT Project
      # 保持 AOT 开启，并针对特定平台构建
      run: dotnet publish -c Release -r ${{ matrix.rid }} -p:PublishAot=true -o ./publish_output/${{ matrix.rid }}

    - name: Compress Release Files (Zip for Windows)
      if: matrix.ext == 'zip'
      shell: bash
      run: |
        cd ./publish_output/${{ matrix.rid }}
        tar -a -c -f ../../QwenCli_${{ matrix.rid }}.zip *
      
    - name: Compress Release Files (Tar.gz for Linux/macOS)
      if: matrix.ext == 'tar.gz'
      shell: bash
      run: |
        cd ./publish_output/${{ matrix.rid }}
        tar -czvf ../../QwenCli_${{ matrix.rid }}.tar.gz *

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: QwenCli_${{ matrix.rid }}.${{ matrix.ext }}
