name: Cross-Platform AOT Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            ext: zip
          - rid: win-x86
            os: windows-latest
            ext: zip
          - rid: win-arm64
            os: windows-latest
            ext: zip
          - rid: linux-x64
            os: ubuntu-latest
            ext: tar.gz
          - rid: linux-arm
            os: ubuntu-latest
            ext: tar.gz
          - rid: linux-arm64
            os: ubuntu-latest
            ext: tar.gz
          - rid: osx-x64
            os: macos-13
            ext: tar.gz
          - rid: osx-arm64
            os: macos-14
            ext: tar.gz

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install Linux x64 AOT Dependencies
      if: matrix.rid == 'linux-x64'
      run: |
        sudo apt-get update
        sudo apt-get install -y clang zlib1g-dev

    - name: Install Linux ARM32 Cross-Compiler
      if: matrix.rid == 'linux-arm'
      run: |
        sudo dpkg --add-architecture armhf
        sudo apt-get update
        sudo apt-get install -y clang llvm gcc-arm-linux-gnueabihf zlib1g-dev:armhf

    - name: Install Linux ARM64 Cross-Compiler
      if: matrix.rid == 'linux-arm64'
      run: |
        sudo dpkg --add-architecture arm64
        sudo apt-get update
        sudo apt-get install -y clang llvm gcc-aarch64-linux-gnu zlib1g-dev:arm64

    - name: Publish AOT
      run: dotnet publish -c Release -r ${{ matrix.rid }} -p:PublishAot=true -o ./publish_output/${{ matrix.rid }}

    - name: Zip Release
      if: matrix.ext == 'zip'
      shell: bash
      run: |
        cd ./publish_output/${{ matrix.rid }}
        tar -a -c -f ../../QwenCli_${{ matrix.rid }}.zip *
      
    - name: Tar Release
      if: matrix.ext == 'tar.gz'
      shell: bash
      run: |
        cd ./publish_output/${{ matrix.rid }}
        tar -czvf ../../QwenCli_${{ matrix.rid }}.tar.gz *

    - name: Upload Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: QwenCli_${{ matrix.rid }}.${{ matrix.ext }}
