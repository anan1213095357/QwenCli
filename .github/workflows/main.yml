name: Qwen AOT Build

on:
  workflow_dispatch: # 允许手动点击运行
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Windows (全架构) ---
          - { rid: win-x64, os: windows-latest, ext: zip }
          - { rid: win-x86, os: windows-latest, ext: zip }
          - { rid: win-arm64, os: windows-latest, ext: zip }
          
          # --- Linux (x64 和 原生 ARM64 服务器) ---
          - { rid: linux-x64, os: ubuntu-latest, ext: tar.gz }
          - { rid: linux-arm64, os: ubuntu-24.04-arm, ext: tar.gz } # <- 核心秘籍：调用纯 ARM 服务器！
          
          # --- macOS (修复 13 报错，统一用 latest) ---
          - { rid: osx-x64, os: macos-latest, ext: tar.gz }
          - { rid: osx-arm64, os: macos-latest, ext: tar.gz }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Linux x64 环境准备
      - name: Install Linux x64 Env
        if: matrix.rid == 'linux-x64'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      # Linux ARM64 环境准备 (因为是原生 ARM 服务器，直接装普通包即可)
      - name: Install Linux arm64 Env
        if: matrix.rid == 'linux-arm64'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Build AOT
        run: dotnet publish -c Release -r ${{ matrix.rid }} -p:PublishAot=true -o ./out/${{ matrix.rid }}

      - name: Zip for Windows
        if: matrix.ext == 'zip'
        shell: bash
        run: cd ./out/${{ matrix.rid }} && tar -a -c -f ../../QwenCli_${{ matrix.rid }}.zip *
        
      - name: Tar for Unix
        if: matrix.ext == 'tar.gz'
        shell: bash
        run: cd ./out/${{ matrix.rid }} && tar -czvf ../../QwenCli_${{ matrix.rid }}.tar.gz *

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest # 强行指定版本号为 latest
          name: "最新自动构建版" # 自动生成的标题
          files: QwenCli_${{ matrix.rid }}.${{ matrix.ext }}
