
name: Cross-Platform Build and Release

# 触发条件：
# 1. 当你推送以 "v" 开头的标签时（例如 v1.0.0）自动触发打包发布
# 2. 允许你在 GitHub 网页端手动点击运行 (workflow_dispatch)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 赋予 Action 创建和修改 Release 的权限
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest # 使用 Ubuntu 环境交叉编译即可，速度快且免费时长多
    
    strategy:
      # 矩阵配置：定义你要编译的所有目标平台及其对应的压缩后缀
      matrix:
        include:
          - rid: win-x64
            os_name: Windows_x64
            ext: zip
          - rid: win-x86
            os_name: Windows_x86
            ext: zip
          - rid: win-arm64
            os_name: Windows_arm64
            ext: zip
          - rid: linux-x64
            os_name: Linux_x64
            ext: tar.gz
          - rid: linux-arm      # Linux 32位 ARM
            os_name: Linux_arm32
            ext: tar.gz
          - rid: linux-arm64
            os_name: Linux_arm64
            ext: tar.gz
          - rid: osx-x64
            os_name: macOS_x64
            ext: tar.gz
          - rid: osx-arm64      # 苹果 M1/M2/M3 芯片
            os_name: macOS_arm64
            ext: tar.gz

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Publish .NET Project
      # -c Release: 发布 Release 版本
      # -r ${{ matrix.rid }}: 对应矩阵中的运行环境
      # --self-contained true: 包含 .NET 运行时，用户电脑没装 .NET 10 也能直接跑
      # -p:PublishSingleFile=true: 打包成单个独立执行文件
      run: dotnet publish -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -o ./publish_output/${{ matrix.rid }}

    - name: Compress Release Files (Windows)
      if: matrix.ext == 'zip'
      run: |
        cd ./publish_output/${{ matrix.rid }}
        zip -r ../../QwenCli_${{ matrix.os_name }}.${{ matrix.ext }} *
      
    - name: Compress Release Files (Linux/macOS)
      if: matrix.ext == 'tar.gz'
      run: |
        cd ./publish_output/${{ matrix.rid }}
        tar -czvf ../../QwenCli_${{ matrix.os_name }}.${{ matrix.ext }} *

    - name: Upload to GitHub Release
      # 这是一个非常流行的第三方 Action，专门用来往 Release 挂载附件
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/') # 只有是通过 tag 触发时才上传
      with:
        files: QwenCli_${{ matrix.os_name }}.${{ matrix.ext }}
