name: QwenCli AOT Build

on:
  workflow_dispatch:
  push:
    branches: ["master"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { rid: win-x64, os: windows-latest, ext: zip, exe: QwenCLI.exe }
          - { rid: win-arm64, os: windows-latest, ext: zip, exe: QwenCLI.exe }
          - { rid: linux-x64, os: ubuntu-latest, ext: tar.gz, exe: QwenCLI }
          - { rid: linux-arm64, os: ubuntu-24.04-arm, ext: tar.gz, exe: QwenCLI }
          - { rid: osx-x64, os: macos-latest, ext: tar.gz, exe: QwenCLI }
          - { rid: osx-arm64, os: macos-latest, ext: tar.gz, exe: QwenCLI }

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Linux Dependencies
        if: startsWith(matrix.rid, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev build-essential

      # 1. 编译 AOT (参数已在 csproj 中定义，此处简化)
      - name: Build AOT
        run: >
          dotnet publish -c Release 
          -r ${{ matrix.rid }} 
          -o ./publish_dir

      # 2. 使用 UPX 进行极致压缩 (针对 Windows 和 Linux)
      # 注：macOS 对 UPX 签名较敏感，可选开启
      - name: UPX Compression
        if: ${{ !startsWith(matrix.rid, 'osx') }}
        uses: svenstaro/upx-action@v2
        with:
          files: ./publish_dir/${{ matrix.exe }}
          args: --best --lzma
          strip: true

      # 3. 清理并打包
      - name: Cleanup and Packaging
        shell: bash
        run: |
          cd ./publish_dir
          # 删除调试符号
          rm -rf *.pdb *.dbg *.dsym
          
          if [[ "${{ matrix.os }}" != "windows-latest" ]]; then
            chmod +x ${{ matrix.exe }}
          fi
          
          if [ "${{ matrix.ext }}" == "zip" ]; then
            tar -a -c -f ../QwenCli_${{ matrix.rid }}.zip *
          else
            tar -czvf ../QwenCli_${{ matrix.rid }}.tar.gz *
          fi

      # 4. 发布
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          files: QwenCli_${{ matrix.rid }}.${{ matrix.ext }}
          generate_release_notes: true
          make_latest: true
          prerelease: false
          append_body: true
