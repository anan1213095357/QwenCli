name: Qwen AOT Build

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows 系列 (全架构)
          - { rid: win-x64, os: windows-latest, ext: zip }
          - { rid: win-x86, os: windows-latest, ext: zip }
          - { rid: win-arm64, os: windows-latest, ext: zip }
          # Linux 系列 (只保留最稳的 x64)
          - { rid: linux-x64, os: ubuntu-latest, ext: tar.gz }
          # macOS 系列 (修复了 macos-13 报错，统一使用 macos-latest)
          - { rid: osx-x64, os: macos-latest, ext: tar.gz }
          - { rid: osx-arm64, os: macos-latest, ext: tar.gz }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Linux x64 Env
        if: matrix.rid == 'linux-x64'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Build AOT
        run: dotnet publish -c Release -r ${{ matrix.rid }} -p:PublishAot=true -o ./out/${{ matrix.rid }}

      - name: Zip for Windows
        if: matrix.ext == 'zip'
        shell: bash
        run: cd ./out/${{ matrix.rid }} && tar -a -c -f ../../QwenCli_${{ matrix.rid }}.zip *
        
      - name: Tar for Unix
        if: matrix.ext == 'tar.gz'
        shell: bash
        run: cd ./out/${{ matrix.rid }} && tar -czvf ../../QwenCli_${{ matrix.rid }}.tar.gz *

      - name: Upload
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: QwenCli_${{ matrix.rid }}.${{ matrix.ext }}
