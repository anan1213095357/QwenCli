name: QwenUpx AOT Build

on:
  workflow_dispatch:
  push:
    branches: ["master"]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { rid: win-x64, os: windows-latest, ext: zip, exe: QwenCli.exe }
          - { rid: win-x86, os: windows-latest, ext: zip, exe: QwenCli.exe }
          - { rid: win-arm64, os: windows-latest, ext: zip, exe: QwenCli.exe }
          - { rid: linux-x64, os: ubuntu-latest, ext: tar.gz, exe: QwenCli }
          - { rid: linux-arm64, os: ubuntu-24.04-arm, ext: tar.gz, exe: QwenCli }
          - { rid: osx-x64, os: macos-latest, ext: tar.gz, exe: QwenCli }
          - { rid: osx-arm64, os: macos-latest, ext: tar.gz, exe: QwenCli }

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # 环境准备
      - name: Install Linux Dependencies
        if: startsWith(matrix.rid, 'linux')
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev build-essential

      # 1. 编译 AOT (输出到 publish_raw 文件夹)
      - name: Build AOT
        run: >
          dotnet publish -c Release 
          -r ${{ matrix.rid }} 
          -p:PublishAot=true 
          -p:StripSymbols=true 
          -o ./publish_raw

      # 2. 关键修复：暴力搜索并对齐文件名
      # 不管文件在哪个子目录，不管它叫 QwenCli 还是 qwencli，通通搜出来改名为统一的名字
      - name: Locate and Fix Binary
        shell: bash
        run: |
          mkdir -p ./final_out
          # 在编译输出目录中搜索可执行文件
          # 排除 pdb, json, dbg 等杂项文件，只抓取二进制主体
          find ./publish_raw -type f ! -name "*.pdb" ! -name "*.json" ! -name "*.dbg" ! -name "*.xml" -exec cp {} ./final_out/${{ matrix.exe }} \;
          echo "确认搜索到的文件内容："
          ls -lh ./final_out/

      # 3. UPX 压缩 (只针对 x64)
      # 现在路径统一成了 ./final_out/文件名，UPX 绝对不会再丢了
      - name: Compress with UPX
        uses: svenstaro/upx-action@v2
        if: matrix.rid == 'win-x64' || matrix.rid == 'linux-x64'
        with:
          files: ./final_out/${{ matrix.exe }}
          args: -9
          strip: false 

      # 4. 打包输出
      - name: Create Archive
        shell: bash
        run: |
          cd ./final_out
          # Linux/macOS 赋予执行权限
          if [[ "${{ matrix.os }}" != "windows-latest" ]]; then
            chmod +x *
          fi
          
          if [ "${{ matrix.ext }}" == "zip" ]; then
            tar -a -c -f ../QwenCli_${{ matrix.rid }}.zip *
          else
            tar -czvf ../QwenCli_${{ matrix.rid }}.tar.gz *
          fi

      # 5. 上传
      - name: Upload
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: latest
          name: "Latest Build"
          files: QwenCli_${{ matrix.rid }}.${{ matrix.ext }}
